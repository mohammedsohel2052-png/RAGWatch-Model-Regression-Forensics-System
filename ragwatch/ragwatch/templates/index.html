<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAGWatch Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            --accent: #38bdf8;
            --accent-glow: 0 0 15px rgba(56, 189, 248, 0.5);
            --success: #34d399;
            --warning: #fbbf24;
            --danger: #f87171;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Glass Navbar */
        nav {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: #fff;
            text-shadow: var(--accent-glow);
        }
        .logo span {
            color: var(--accent);
        }

        .tabs {
            display: flex;
            gap: 1.5rem;
        }
        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .tab-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        .tab-btn.active {
            color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
            box-shadow: inset 0 0 10px rgba(56, 189, 248, 0.2);
        }

        /* Main Container */
        .container {
            padding: 2rem;
            flex-grow: 1;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* Glass Cards */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            animation: fadeUp 0.5s ease forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .glass-card h2 {
            margin-top: 0;
            font-weight: 600;
            font-size: 1.25rem;
            color: var(--accent);
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 0.75rem;
            margin-bottom: 1rem;
        }

        /* Table Styles */
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--glass-border);
        }
        th {
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.5px;
        }
        tr:last-child td {
            border-bottom: none;
        }
        tr:hover td {
            background: rgba(255, 255, 255, 0.03);
        }

        /* Metrics Grid */
        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .metric-box {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.3s ease;
        }
        .metric-box:hover {
            transform: translateY(-5px);
            box-shadow: var(--accent-glow);
            border-color: rgba(56, 189, 248, 0.3);
        }
        .metric-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
            margin: 0.5rem 0;
        }
        .metric-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Badges */
        .badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        .badge.baseline {
            background: rgba(52, 211, 153, 0.2);
            color: var(--success);
            border: 1px solid rgba(52, 211, 153, 0.3);
        }
        .badge.run {
            background: rgba(148, 163, 184, 0.2);
            color: var(--text-muted);
            border: 1px solid rgba(148, 163, 184, 0.3);
        }

        .output-preview {
            font-family: monospace;
            background: rgba(0,0,0,0.3);
            padding: 0.5rem;
            border-radius: 6px;
            color: #a78bfa;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 300px;
            display: inline-block;
        }

        /* Views */
        .view-section {
            display: none;
        }
        .view-section.active {
            display: block;
        }

        .loading {
            text-align: center;
            color: var(--accent);
            padding: 3rem;
            font-size: 1.2rem;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">RAG<span>Watch</span></div>
        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('evals')">Evaluations</button>
            <button class="tab-btn" onclick="switchTab('traces')">Live Traces</button>
        </div>
    </nav>

    <div class="container">
        
        <!-- Evaluations View -->
        <div id="evals" class="view-section active">
            <div class="metrics-grid" id="latestMetrics">
                <!-- Populated by JS -->
            </div>

            <div class="glass-card">
                <h2>Evaluation Runs History</h2>
                <div id="runsLoader" class="loading">Loading Evaluation Data...</div>
                <table id="runsTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>Status</th>
                            <th>Timestamp</th>
                            <th>Precision</th>
                            <th>Recall</th>
                            <th>Relevancy</th>
                            <th>Faithfulness</th>
                            <th>Latency</th>
                        </tr>
                    </thead>
                    <tbody id="runsBody">
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Traces View -->
        <div id="traces" class="view-section">
            <div class="glass-card">
                <h2>Live Telemetry Feed (via @monitor)</h2>
                <div id="tracesLoader" class="loading">Loading Live Traces...</div>
                <table id="tracesTable" style="display:none;">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Project</th>
                            <th>Function</th>
                            <th>Latency (ms)</th>
                            <th>Output Preview</th>
                        </tr>
                    </thead>
                    <tbody id="tracesBody">
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            document.getElementById(tabId).classList.add('active');
            event.target.classList.add('active');

            if(tabId === 'evals') loadRuns();
            if(tabId === 'traces') loadTraces();
        }

        function formatNumber(num) {
            return Number(num).toFixed(2);
        }
        
        function formatDate(isoString) {
            if(!isoString) return "N/A";
            // Check if it's a unix timestamp
            if(!isNaN(isoString) && Number(isoString) > 0) {
                 return new Date(Number(isoString)*1000).toLocaleString();
            }
            try {
                return new Date(isoString).toLocaleString();
            } catch(e) {
                return isoString;
            }
        }

        async function loadRuns() {
            try {
                const res = await fetch('/api/runs');
                const runs = await res.json();
                
                document.getElementById('runsLoader').style.display = 'none';
                document.getElementById('runsTable').style.display = 'table';
                
                if (runs.length > 0) {
                    const latest = runs[0];
                    document.getElementById('latestMetrics').innerHTML = `
                        <div class="metric-box">
                            <div class="metric-label">Avg Precision</div>
                            <div class="metric-value">${formatNumber(latest.avg_context_precision)}</div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-label">Avg Recall</div>
                            <div class="metric-value">${formatNumber(latest.avg_context_recall)}</div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-label">Answer Relevancy</div>
                            <div class="metric-value">${formatNumber(latest.avg_answer_relevancy)}</div>
                        </div>
                        <div class="metric-box">
                            <div class="metric-label">Faithfulness</div>
                            <div class="metric-value">${formatNumber(latest.faithfulness_score)}</div>
                        </div>
                    `;
                }

                const tbody = document.getElementById('runsBody');
                tbody.innerHTML = '';
                runs.forEach(run => {
                    const badge = run.is_baseline ? '<span class="badge baseline">Baseline</span>' : '<span class="badge run">Run</span>';
                    tbody.innerHTML += `
                        <tr>
                            <td>${badge}</td>
                            <td>${formatDate(run.timestamp)}</td>
                            <td>${formatNumber(run.avg_context_precision)}</td>
                            <td>${formatNumber(run.avg_context_recall)}</td>
                            <td>${formatNumber(run.avg_answer_relevancy)}</td>
                            <td>${formatNumber(run.faithfulness_score)}</td>
                            <td>${formatNumber(run.avg_latency_ms)}ms</td>
                        </tr>
                    `;
                });
            } catch (e) {
                console.error(e);
                document.getElementById('runsLoader').innerText = "No evaluation database found. Run an evaluation first!";
            }
        }

        async function loadTraces() {
            try {
                const res = await fetch('/api/traces');
                const traces = await res.json();
                
                document.getElementById('tracesLoader').style.display = 'none';
                document.getElementById('tracesTable').style.display = 'table';
                
                const tbody = document.getElementById('tracesBody');
                tbody.innerHTML = '';
                traces.forEach(trace => {
                    tbody.innerHTML += `
                        <tr>
                            <td>${formatDate(trace.timestamp)}</td>
                            <td style="color: var(--accent); font-weight:600;">${trace.project}</td>
                            <td>${trace.function_name}</td>
                            <td style="color: ${trace.latency_ms > 2000 ? 'var(--warning)' : 'var(--success)'}">${formatNumber(trace.latency_ms)}</td>
                            <td><span class="output-preview">${trace.output_preview}</span></td>
                        </tr>
                    `;
                });
            } catch (e) {
                console.error(e);
                document.getElementById('tracesLoader').innerText = "No traces database found. Run a @monitored function first!";
            }
        }

        // Initialize
        loadRuns();
    </script>
</body>
</html>
